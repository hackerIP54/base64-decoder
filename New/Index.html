<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Universal Base64 Viewer</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#0f172a;
        color:white;
        font-family:Inter, Arial, sans-serif;
        min-height:100vh;
        padding:40px 20px;
        background:
        radial-gradient(circle at top left,#1e293b 0%,#0f172a 45%),
        radial-gradient(circle at bottom right,#111827 0%,#020617 55%);
    }

    .container{
        max-width:1100px;
        margin:auto;
    }

    .card{
        background:rgba(15,23,42,0.75);
        border:1px solid rgba(255,255,255,0.08);
        backdrop-filter:blur(12px);
        border-radius:24px;
        padding:28px;
        box-shadow:
        0 10px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    h1{
        text-align:center;
        font-size:38px;
        margin-bottom:12px;
        background:linear-gradient(90deg,#60a5fa,#a78bfa,#22d3ee);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .sub{
        text-align:center;
        color:#94a3b8;
        margin-bottom:28px;
        font-size:15px;
    }

    textarea{
        width:100%;
        height:220px;
        background:#020617;
        color:white;
        border:1px solid rgba(255,255,255,0.08);
        border-radius:18px;
        padding:18px;
        resize:vertical;
        font-size:15px;
        outline:none;
        transition:0.25s;
    }

    textarea:focus{
        border-color:#60a5fa;
        box-shadow:0 0 0 4px rgba(96,165,250,0.15);
    }

    .buttons{
        display:flex;
        gap:14px;
        flex-wrap:wrap;
        margin-top:20px;
    }

    button{
        border:none;
        border-radius:14px;
        padding:14px 22px;
        cursor:pointer;
        font-weight:600;
        transition:0.25s;
        font-size:15px;
    }

    .primary{
        background:linear-gradient(135deg,#3b82f6,#8b5cf6);
        color:white;
    }

    .primary:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 25px rgba(59,130,246,0.35);
    }

    .secondary{
        background:#1e293b;
        color:white;
    }

    .secondary:hover{
        background:#334155;
    }

    .output{
        margin-top:28px;
        background:#020617;
        border-radius:20px;
        padding:24px;
        min-height:220px;
        border:1px solid rgba(255,255,255,0.06);
        overflow:hidden;
    }

    .type{
        display:inline-flex;
        align-items:center;
        gap:8px;
        background:rgba(59,130,246,0.12);
        border:1px solid rgba(96,165,250,0.3);
        color:#7dd3fc;
        padding:8px 14px;
        border-radius:999px;
        font-size:14px;
        margin-bottom:20px;
    }

    img,
    video,
    iframe{
        width:100%;
        border:none;
        border-radius:16px;
        overflow:hidden;
        background:black;
    }

    audio{
        width:100%;
        margin-top:10px;
    }

    .text-view{
        background:#0f172a;
        border-radius:14px;
        padding:18px;
        line-height:1.6;
        white-space:pre-wrap;
        word-break:break-word;
        color:#e2e8f0;
        border:1px solid rgba(255,255,255,0.06);
    }

    .empty{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:180px;
        color:#64748b;
        text-align:center;
        font-size:16px;
    }

    .footer{
        text-align:center;
        color:#64748b;
        margin-top:18px;
        font-size:13px;
    }

    @media(max-width:700px){
        h1{
            font-size:30px;
        }

        .card{
            padding:20px;
        }

        button{
            width:100%;
        }
    }
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Universal Base64 Viewer</h1>

        <div class="sub">
            Erkennt automatisch Bilder, Videos, Audio, PDFs, URLs, URI Base64 und normalen Text
        </div>

        <textarea id="input"
        placeholder="Base64, Data URI, URL oder Text hier einfügen..."></textarea>

        <div class="buttons">
            <button class="primary" onclick="detectInput()">
                Erkennen
            </button>

            <button class="secondary" onclick="encodeText()">
                Text → Base64
            </button>

            <button class="secondary" onclick="clearAll()">
                Leeren
            </button>
        </div>

        <div class="output" id="output">
            <div class="empty">
                Noch keine Daten analysiert
            </div>
        </div>

        <div class="footer">
            Unterstützt Raw Base64, Data URI, URLs, Bilder, Videos, Audio & mehr
        </div>
<div class="footer">
    © 2026 HackerIP54 — Universal Base64 Viewer • All Rights Reserved
</div>
    </div>

</div>

<script>

const output = document.getElementById("output");

function clearAll(){
    document.getElementById("input").value = "";

    output.innerHTML = `
        <div class="empty">
            Noch keine Daten analysiert
        </div>
    `;
}

function encodeText(){
    const text = document.getElementById("input").value.trim();

    if(!text){
        return;
    }

    try{
        const encoded = btoa(unescape(encodeURIComponent(text)));

        output.innerHTML = `
            <div class="type">
                Text erfolgreich encodet
            </div>

            <div class="text-view">
                ${escapeHtml(encoded)}
            </div>
        `;
    }catch{
        output.innerHTML = `
            <div class="type">
                Fehler beim Encoden
            </div>
        `;
    }
}

function isURL(str){
    try{
        new URL(str);
        return true;
    }catch{
        return false;
    }
}

function looksLikeBase64(str){
    str = str.trim();

    if(str.startsWith("data:")) return true;

    return /^[A-Za-z0-9+/=\s]+$/.test(str) && str.length > 30;
}

function detectMime(base64){

    if(base64.startsWith("/9j/"))
        return "image/jpeg";

    if(base64.startsWith("iVBOR"))
        return "image/png";

    if(base64.startsWith("R0lGOD"))
        return "image/gif";

    if(base64.startsWith("UklGR"))
        return "audio/wav";

    if(base64.startsWith("SUQz"))
        return "audio/mp3";

    if(base64.startsWith("AAAAFGZ0"))
        return "video/mp4";

    if(base64.startsWith("JVBER"))
        return "application/pdf";

    return "text/plain";
}

function decodeBase64(base64){
    try{
        return decodeURIComponent(escape(atob(base64)));
    }catch{
        return null;
    }
}

function detectInput(){

    let input = document.getElementById("input").value.trim();

    if(!input){
        return;
    }

    // URL
    if(isURL(input)){

        const lower = input.toLowerCase();

        if(lower.match(/\.(jpg|jpeg|png|gif|webp)$/)){

            output.innerHTML = `
                <div class="type">
                    Bild URL erkannt
                </div>

                <img src="${input}">
            `;

            return;
        }

        if(lower.match(/\.(mp4|webm|ogg)$/)){

            output.innerHTML = `
                <div class="type">
                    Video URL erkannt
                </div>

                <video controls src="${input}"></video>
            `;

            return;
        }

        if(lower.match(/\.(mp3|wav|ogg)$/)){

            output.innerHTML = `
                <div class="type">
                    Audio URL erkannt
                </div>

                <audio controls src="${input}"></audio>
            `;

            return;
        }

        output.innerHTML = `
            <div class="type">
                Webseite erkannt
            </div>

            <iframe src="${input}" height="600"></iframe>
        `;

        return;
    }

    // DATA URI
    if(input.startsWith("data:")){

        const mimeMatch = input.match(/^data:(.*?);base64,/);

        const mime = mimeMatch
            ? mimeMatch[1]
            : "text/plain";

        renderByMime(input,mime);

        return;
    }

    // RAW BASE64
    if(looksLikeBase64(input)){

        input = input.replace(/\s/g,"");

        const mime = detectMime(input);

        const dataUri =
        `data:${mime};base64,${input}`;

        renderByMime(dataUri,mime,input);

        return;
    }

    // TEXT
    output.innerHTML = `
        <div class="type">
            Text erkannt
        </div>

        <div class="text-view">
            ${escapeHtml(input)}
        </div>
    `;
}

function renderByMime(dataUri,mime,raw=""){

    // Bild
    if(mime.startsWith("image/")){

        output.innerHTML = `
            <div class="type">
                Bild erkannt (${mime})
            </div>

            <img src="${dataUri}">
        `;

        return;
    }

    // Video
    if(mime.startsWith("video/")){

        output.innerHTML = `
            <div class="type">
                Video erkannt (${mime})
            </div>

            <video controls src="${dataUri}"></video>
        `;

        return;
    }

    // Audio
    if(mime.startsWith("audio/")){

        output.innerHTML = `
            <div class="type">
                Audio erkannt (${mime})
            </div>

            <audio controls src="${dataUri}"></audio>
        `;

        return;
    }

    // PDF
    if(mime === "application/pdf"){

        output.innerHTML = `
            <div class="type">
                PDF erkannt
            </div>

            <iframe src="${dataUri}" height="700"></iframe>
        `;

        return;
    }

    // Text Base64
    const decoded = decodeBase64(raw);

    output.innerHTML = `
        <div class="type">
            Base64 Text erkannt
        </div>

        <div class="text-view">
            ${escapeHtml(decoded || "Text konnte nicht dekodiert werden")}
        </div>
    `;
}

function escapeHtml(text){

    return text
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

</script>

</body>
</html>
